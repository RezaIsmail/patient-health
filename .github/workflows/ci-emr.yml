name: CI — EMR

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/emr/**'
      - 'services/emr-service/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/ci-emr.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/emr/**'
      - 'services/emr-service/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/ci-emr.yml'

concurrency:
  group: ci-emr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint, type-check, test, build ─────────────────────────────────────────

  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npx turbo run build --filter=@patient-health/types --filter=@patient-health/ui

      - name: Lint — emr-service
        run: npx turbo run lint --filter=emr-service

      - name: Lint — emr (frontend)
        run: npx turbo run lint --filter=emr

      - name: Type-check — emr-service
        working-directory: services/emr-service
        run: npx tsc --noEmit

      - name: Type-check — emr (frontend)
        working-directory: apps/emr
        run: npx tsc --noEmit

      - name: Test — emr-service
        run: npx turbo run test --filter=emr-service

      - name: Test — emr (frontend)
        run: npx turbo run test --filter=emr

      - name: Build — emr-service
        run: npx turbo run build --filter=emr-service

      - name: Build — emr (frontend)
        run: npx turbo run build --filter=emr

  # ── Deploy to staging ─────────────────────────────────────────────────────

  deploy-staging:
    name: Deploy → Staging
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push emr-service image
        uses: docker/build-push-action@v5
        with:
          context: services/emr-service
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/emr-service:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push emr frontend image
        uses: docker/build-push-action@v5
        with:
          context: apps/emr
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/emr-frontend:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to staging namespace
        run: |
          echo "Deploying emr-service:staging-${{ github.sha }} to staging"
          # kubectl set image deployment/emr-service emr-service=${{ secrets.REGISTRY_URL }}/emr-service:staging-${{ github.sha }} -n emr-staging
          # kubectl set image deployment/emr-frontend emr-frontend=${{ secrets.REGISTRY_URL }}/emr-frontend:staging-${{ github.sha }} -n emr-staging
          # kubectl rollout status deployment/emr-service -n emr-staging --timeout=120s
          # kubectl rollout status deployment/emr-frontend -n emr-staging --timeout=120s

  # ── Deploy to production ──────────────────────────────────────────────────

  deploy-production:
    name: Deploy → Production
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push emr-service image
        uses: docker/build-push-action@v5
        with:
          context: services/emr-service
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/emr-service:${{ github.sha }}
            ${{ secrets.REGISTRY_URL }}/emr-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push emr frontend image
        uses: docker/build-push-action@v5
        with:
          context: apps/emr
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/emr-frontend:${{ github.sha }}
            ${{ secrets.REGISTRY_URL }}/emr-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production namespace
        run: |
          echo "Deploying emr-service:${{ github.sha }} to production"
          # kubectl set image deployment/emr-service emr-service=${{ secrets.REGISTRY_URL }}/emr-service:${{ github.sha }} -n emr-production
          # kubectl set image deployment/emr-frontend emr-frontend=${{ secrets.REGISTRY_URL }}/emr-frontend:${{ github.sha }} -n emr-production
          # kubectl rollout status deployment/emr-service -n emr-production --timeout=180s
          # kubectl rollout status deployment/emr-frontend -n emr-production --timeout=180s
