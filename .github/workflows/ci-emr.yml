name: CI — EMR

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/emr/**'
      - 'services/emr-service/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/ci-emr.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/emr/**'
      - 'services/emr-service/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/ci-emr.yml'

concurrency:
  group: ci-emr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint, type-check, test, build ─────────────────────────────────────────

  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npx turbo run build --filter=@patient-health/types --filter=@patient-health/ui

      - name: Lint — emr-service
        run: npx turbo run lint --filter=@patient-health/emr-service

      - name: Lint — emr (frontend)
        run: npx turbo run lint --filter=@patient-health/emr

      - name: Type-check — emr-service
        working-directory: services/emr-service
        run: npx tsc --noEmit

      - name: Type-check — emr (frontend)
        working-directory: apps/emr
        run: npx tsc --noEmit

      - name: Test — emr-service
        run: npx turbo run test --filter=@patient-health/emr-service

      - name: Test — emr (frontend)
        run: npx turbo run test --filter=@patient-health/emr

      - name: Build — emr-service
        run: npx turbo run build --filter=@patient-health/emr-service

      - name: Build — emr (frontend)
        run: npx turbo run build --filter=@patient-health/emr

  # ── Deployment ────────────────────────────────────────────────────────────
  # Railway deploys automatically on push via its GitHub integration.
  # No CI deploy steps required.
