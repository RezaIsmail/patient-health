name: CI — CRM

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/crm/**'
      - 'services/crm-service/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/ci-crm.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/crm/**'
      - 'services/crm-service/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/ci-crm.yml'

concurrency:
  group: ci-crm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint, type-check, test, build ─────────────────────────────────────────

  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npx turbo run build --filter=@patient-health/types --filter=@patient-health/ui

      - name: Lint — crm-service
        run: npx turbo run lint --filter=@patient-health/crm-service

      - name: Lint — crm (frontend)
        run: npx turbo run lint --filter=@patient-health/crm

      - name: Type-check — crm-service
        working-directory: services/crm-service
        run: npx tsc --noEmit

      - name: Type-check — crm (frontend)
        working-directory: apps/crm
        run: npx tsc --noEmit

      - name: Test — crm-service
        run: npx turbo run test --filter=@patient-health/crm-service

      - name: Test — crm (frontend)
        run: npx turbo run test --filter=@patient-health/crm

      - name: Build — crm-service
        run: npx turbo run build --filter=@patient-health/crm-service

      - name: Build — crm (frontend)
        run: npx turbo run build --filter=@patient-health/crm

  # ── Deployment ────────────────────────────────────────────────────────────
  # Railway deploys automatically on push via its GitHub integration.
  # No CI deploy steps required.
