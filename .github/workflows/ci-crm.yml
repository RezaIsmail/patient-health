name: CI — CRM

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/crm/**'
      - 'services/crm-service/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/ci-crm.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/crm/**'
      - 'services/crm-service/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/ci-crm.yml'

concurrency:
  group: ci-crm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint, type-check, test, build ─────────────────────────────────────────

  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npx turbo run build --filter=@patient-health/types --filter=@patient-health/ui

      - name: Lint — crm-service
        run: npx turbo run lint --filter=crm-service

      - name: Lint — crm (frontend)
        run: npx turbo run lint --filter=crm

      - name: Type-check — crm-service
        working-directory: services/crm-service
        run: npx tsc --noEmit

      - name: Type-check — crm (frontend)
        working-directory: apps/crm
        run: npx tsc --noEmit

      - name: Test — crm-service
        run: npx turbo run test --filter=crm-service

      - name: Test — crm (frontend)
        run: npx turbo run test --filter=crm

      - name: Build — crm-service
        run: npx turbo run build --filter=crm-service

      - name: Build — crm (frontend)
        run: npx turbo run build --filter=crm

  # ── Deploy to staging ─────────────────────────────────────────────────────

  deploy-staging:
    name: Deploy → Staging
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push crm-service image
        uses: docker/build-push-action@v5
        with:
          context: services/crm-service
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/crm-service:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push crm frontend image
        uses: docker/build-push-action@v5
        with:
          context: apps/crm
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/crm-frontend:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to staging namespace
        run: |
          echo "Deploying crm-service:staging-${{ github.sha }} to staging"
          # kubectl set image deployment/crm-service crm-service=${{ secrets.REGISTRY_URL }}/crm-service:staging-${{ github.sha }} -n crm-staging
          # kubectl set image deployment/crm-frontend crm-frontend=${{ secrets.REGISTRY_URL }}/crm-frontend:staging-${{ github.sha }} -n crm-staging
          # kubectl rollout status deployment/crm-service -n crm-staging --timeout=120s
          # kubectl rollout status deployment/crm-frontend -n crm-staging --timeout=120s

  # ── Deploy to production ──────────────────────────────────────────────────

  deploy-production:
    name: Deploy → Production
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push crm-service image
        uses: docker/build-push-action@v5
        with:
          context: services/crm-service
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/crm-service:${{ github.sha }}
            ${{ secrets.REGISTRY_URL }}/crm-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push crm frontend image
        uses: docker/build-push-action@v5
        with:
          context: apps/crm
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/crm-frontend:${{ github.sha }}
            ${{ secrets.REGISTRY_URL }}/crm-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production namespace
        run: |
          echo "Deploying crm-service:${{ github.sha }} to production"
          # kubectl set image deployment/crm-service crm-service=${{ secrets.REGISTRY_URL }}/crm-service:${{ github.sha }} -n crm-production
          # kubectl set image deployment/crm-frontend crm-frontend=${{ secrets.REGISTRY_URL }}/crm-frontend:${{ github.sha }} -n crm-production
          # kubectl rollout status deployment/crm-service -n crm-production --timeout=180s
          # kubectl rollout status deployment/crm-frontend -n crm-production --timeout=180s
