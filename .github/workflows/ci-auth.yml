name: CI — Auth Service

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/auth-service/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/ci-auth.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/auth-service/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/ci-auth.yml'

concurrency:
  group: ci-auth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint, type-check, test, build ─────────────────────────────────────────

  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npx turbo run build --filter=@patient-health/types

      - name: Lint — auth-service
        run: npx turbo run lint --filter=@patient-health/auth-service

      - name: Type-check — auth-service
        working-directory: services/auth-service
        run: npx tsc --noEmit

      - name: Test — auth-service
        run: npx turbo run test --filter=@patient-health/auth-service

      - name: Build — auth-service
        run: npx turbo run build --filter=@patient-health/auth-service

  # ── Deployment ────────────────────────────────────────────────────────────
  # Railway deploys automatically on push via its GitHub integration.
  # No CI deploy steps required.
