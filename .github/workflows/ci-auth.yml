name: CI — Auth Service

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/auth-service/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/ci-auth.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/auth-service/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/ci-auth.yml'

concurrency:
  group: ci-auth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint, type-check, test, build ─────────────────────────────────────────

  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npx turbo run build --filter=@patient-health/types

      - name: Lint — auth-service
        run: npx turbo run lint --filter=@patient-health/auth-service

      - name: Type-check — auth-service
        working-directory: services/auth-service
        run: npx tsc --noEmit

      - name: Test — auth-service
        run: npx turbo run test --filter=@patient-health/auth-service

      - name: Build — auth-service
        run: npx turbo run build --filter=@patient-health/auth-service

  # ── Deploy to staging ─────────────────────────────────────────────────────
  # Auth service is shared across all products — deploy carefully

  deploy-staging:
    name: Deploy → Staging
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push auth-service image
        uses: docker/build-push-action@v5
        with:
          context: services/auth-service
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/auth-service:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to staging namespace
        run: |
          echo "Deploying auth-service:staging-${{ github.sha }} to staging"
          # kubectl set image deployment/auth-service auth-service=${{ secrets.REGISTRY_URL }}/auth-service:staging-${{ github.sha }} -n shared-staging
          # kubectl rollout status deployment/auth-service -n shared-staging --timeout=120s

  # ── Deploy to production ──────────────────────────────────────────────────

  deploy-production:
    name: Deploy → Production
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push auth-service image
        uses: docker/build-push-action@v5
        with:
          context: services/auth-service
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/auth-service:${{ github.sha }}
            ${{ secrets.REGISTRY_URL }}/auth-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production namespace
        run: |
          echo "Deploying auth-service:${{ github.sha }} to production"
          # kubectl set image deployment/auth-service auth-service=${{ secrets.REGISTRY_URL }}/auth-service:${{ github.sha }} -n shared-production
          # kubectl rollout status deployment/auth-service -n shared-production --timeout=180s
