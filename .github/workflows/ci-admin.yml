name: CI — Admin

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/admin/**'
      - 'services/admin-service/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/ci-admin.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/admin/**'
      - 'services/admin-service/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/ci-admin.yml'

concurrency:
  group: ci-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint, type-check, test, build ─────────────────────────────────────────

  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npx turbo run build --filter=@patient-health/types --filter=@patient-health/ui

      - name: Lint — admin-service
        run: npx turbo run lint --filter=@patient-health/admin-service

      - name: Lint — admin (frontend)
        run: npx turbo run lint --filter=@patient-health/admin

      - name: Type-check — admin-service
        working-directory: services/admin-service
        run: npx tsc --noEmit

      - name: Type-check — admin (frontend)
        working-directory: apps/admin
        run: npx tsc --noEmit

      - name: Test — admin-service
        run: npx turbo run test --filter=@patient-health/admin-service

      - name: Test — admin (frontend)
        run: npx turbo run test --filter=@patient-health/admin

      - name: Build — admin-service
        run: npx turbo run build --filter=@patient-health/admin-service

      - name: Build — admin (frontend)
        run: npx turbo run build --filter=@patient-health/admin

  # ── Deployment ────────────────────────────────────────────────────────────
  # Railway deploys automatically on push via its GitHub integration.
  # No CI deploy steps required.
