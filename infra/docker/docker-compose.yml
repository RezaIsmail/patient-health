version: '3.9'

services:
  # ── Databases ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend services ──────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ../../services/auth-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  emr-service:
    build:
      context: ../../services/emr-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3002:3002'
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3002/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ──────────────────────────────────────────────────────────────────
  emr-frontend:
    build:
      context: ../../apps/emr
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      auth-service:
        condition: service_healthy
      emr-service:
        condition: service_healthy

volumes:
  postgres_data:
